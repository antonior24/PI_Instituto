spring.application.name=app-horario

#Puerto 
server.port=8081

#BASE DE DATOS
spring.datasource.url=jdbc:mariadb://localhost:3306/app-horario
spring.datasource.username=admin
spring.datasource.password=admin
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=trace

# Ejecutar data.sql después de crear las tablas
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

#SEGURIDAD
jwt.secretKey=XXXYYY

# Configuración de API de IA (Google Gemini)
# Obtén tu clave gratuita en: https://aistudio.google.com/apikey
# Configura la variable de entorno: export GOOGLE_GEMINI_API_KEY="tu-clave"
google.gemini.api.key=${GOOGLE_GEMINI_API_KEY:}

# Recuperacion de contrasena
# Modos posibles:
# - testing: muestra la contrasena temporal en la respuesta
# - production: envia la contrasena por email y exige SMTP configurado
# Para usar el modo production define al menos:
# SPRING_MAIL_HOST
# SPRING_MAIL_PORT
# SPRING_MAIL_USERNAME
# SPRING_MAIL_PASSWORD
# Si se migra a proveedor por API:
# - Resend requiere dominio o subdominio verificado para envio general.
# - Brevo puede usarse con sender verificable por OTP si existe remitente fijo.
# RESEND_API_KEY y BREVO_API_KEY no se usan todavia en codigo.
# resend.api.key=${RESEND_API_KEY:}
# resend.from=${RESEND_FROM:}
# brevo.api.key=${BREVO_API_KEY:}
# brevo.sender.email=${BREVO_SENDER_EMAIL:}
app.password-recovery.mode=production
app.password-recovery.mail.from=${MAIL_FROM:${spring.mail.username:no-reply@iespoligonosur.org}}

spring.mail.host=smtp.iespoligonosur.org
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS_ENABLE:true}


