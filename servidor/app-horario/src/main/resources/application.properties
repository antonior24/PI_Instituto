spring.application.name=app-horario

#Puerto 
server.port=8081

#BASE DE DATOS
spring.datasource.url=jdbc:mariadb://localhost:3306/app-horario
spring.datasource.username=admin
spring.datasource.password=admin
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=trace

# Ejecutar data.sql después de crear las tablas
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

#SEGURIDAD
jwt.secretKey=XXXYYY

# Configuración de API de IA (Google Gemini)
# Obtén tu clave gratuita en: https://aistudio.google.com/apikey
# Configura la variable de entorno: export GOOGLE_GEMINI_API_KEY="tu-clave"
google.gemini.api.key=${GOOGLE_GEMINI_API_KEY:}

# Recuperacion de contrasena
# Modos posibles:
# - testing: muestra la contrasena temporal en la respuesta
# - production: envia la contrasena por email usando MailPit/SMTP
app.password-recovery.mode=production

# ========================================
# Mailpit SMTP for Production (Testing Emails)
# Run: docker run -p 1025:1025 -p 8025:8025 mailpit/mailpit
# Web UI: http://localhost:8025
# ========================================
spring.mail.host=172.17.0.1
spring.mail.port=1025
#spring.mail.username=
#spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
