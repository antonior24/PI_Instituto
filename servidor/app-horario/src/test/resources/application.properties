# H2 Database configuration for Tests
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# En tests no cargamos data.sql (usa sintaxis MariaDB como ON DUPLICATE KEY)
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=false

# Perfil de tests (evita inicializadores y deja configuración estable)
spring.profiles.active=test
app.password-recovery.mode=testing

# Menos ruido en salida de tests
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.type.descriptor.sql=OFF
